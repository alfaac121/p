<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test móvil</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:40px;
}
.mensaje-destacado {
  font-size: 14px;
  color: #333;
  max-width: 340px;
  margin: 0 auto 20px;
  padding: 12px 16px;
  background: #e8f4fc;
  border-radius: 8px;
  border: 1px solid #b3d9f2;
}
</style>

</head>

<body>

<h3>Prueba de apertura de pestañas</h3>

<p class="mensaje-destacado">
  Haz clic en el botón y permitir.
</p>

<button onclick="iniciar()">Iniciar prueba</button>

<div id="enlaces" style="display:none; margin-top:24px;">
  <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">
    <!-- Los enlaces se generan aquí -->
  </div>
</div>

<script>

const limite = 5;

function iniciar(){
  // Abrir todas las pestañas (la primera vez el navegador pedirá "Permitir")
  for (let i = 0; i < limite; i++) {
    window.open("https://example.com/?tab=" + i, "_blank");
  }

  // Mostrar también los enlaces por si no se abrieron
  const div = document.getElementById("enlaces");
  const contenedor = div.querySelector("div");

  if (contenedor.innerHTML === "") {
    for (let i = 0; i < limite; i++) {
      const a = document.createElement("a");
      a.href = "https://example.com/?tab=" + i;
      a.target = "_blank";
      a.rel = "noopener";
      a.textContent = "Abrir pestaña " + (i + 1);
      a.style.cssText = "color:#1a73e8; text-decoration:none; font-size:16px; padding:8px 16px; border:1px solid #1a73e8; border-radius:8px;";
      contenedor.appendChild(a);
    }
  }

  div.style.display = "block";
}

</script>

</body>
</html>
