<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test móvil</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:40px;
}
</style>

</head>

<body>

<h3>Prueba de apertura de pestañas</h3>
<button onclick="iniciar()">Iniciar prueba</button>

<p id="aviso" style="display:none; font-size:13px; color:#666; margin-top:16px; max-width:320px; margin-left:auto; margin-right:auto;">
  Si solo se abrió una o ninguna: en la barra de direcciones haz clic en el icono de ventanas bloqueadas → <strong>Permitir siempre en este sitio</strong>. Luego vuelve a pulsar el botón y se abrirán todas automáticamente.
</p>

<div id="enlaces" style="display:none; margin-top:20px;">
  <p style="font-size:14px; color:#555;">O abre cada una con estos enlaces:</p>
  <div style="display:flex; flex-direction:column; gap:8px; align-items:center; margin-top:12px;">
    <!-- Los enlaces se generan aquí -->
  </div>
</div>

<script>

const limite = 5;

function iniciar(){
  // Intentar abrir todas automáticamente (puede bloquear la primera vez)
  for (let i = 0; i < limite; i++) {
    window.open("https://example.com/?tab=" + i, "_blank");
  }

  // Mostrar aviso y enlaces de respaldo
  document.getElementById("aviso").style.display = "block";

  const div = document.getElementById("enlaces");
  const contenedor = div.querySelector("div");

  if (contenedor.innerHTML === "") {
    for (let i = 0; i < limite; i++) {
      const a = document.createElement("a");
      a.href = "https://example.com/?tab=" + i;
      a.target = "_blank";
      a.rel = "noopener";
      a.textContent = "Abrir pestaña " + (i + 1);
      a.style.cssText = "color:#1a73e8; text-decoration:none; font-size:16px; padding:6px 0;";
      contenedor.appendChild(a);
    }
  }

  div.style.display = "block";
}

</script>

</body>
</html>
