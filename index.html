<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test móvil</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:40px;
}
</style>

</head>

<body>

<h3>Prueba de apertura de pestañas</h3>
<button onclick="iniciar()">Iniciar prueba</button>

<script>

const limite = 5; // máximo de pestañas

function iniciar(){
  // Abrir todas las pestañas en el mismo clic (síncrono) para que el navegador no las bloquee
  for (let i = 0; i < limite; i++) {
    window.open("https://example.com/?tab=" + i, "_blank");
  }
}

</script>

</body>
</html>
